title: DuckBlog

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

defaultContentLanguage: zh

languages:
  zh:
    languageName: 中文
    weight: 1

menu:
  main:
    - name: 文章
      pageRef: /docs
      weight: 1
    - name: 关于我
      pageRef: /about
      weight: 2
    - name: 搜索
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/djskncxm/"
      params:
        icon: github
    - name: Theme Toggle
      params:
        type: theme-toggle
        label: true

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: true
  theme:
    default: dark
    displayToggle: true
  math:
    engine: katex
    katex:
      base: "https://cdn.jsdelivr.net/npm/katex@0.16.22/dist"
